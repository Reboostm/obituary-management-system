<!--
  ============================================================================
  OBITUARY PAGE FLOWER LINK INJECTOR — Paste into GHL Custom HTML element
  on the OBITUARY page (didericksenmemorialfuneralservices.com), AFTER the
  iframe that loads the obituary embed.

  What it does:
    1. Listens for the obituary-data postMessage from the embed iframe.
    2. Stores the data in localStorage (for same-domain fallback).
    3. Finds every "Order Flowers" anchor on the page and appends the
       deceased / service / obituary-url info as URL parameters so the
       checkout-page script can read it cross-origin.

  IMPORTANT — the "Order Flowers" link must:
    - have href starting with the GHL checkout URL, OR
    - have class "rb-flower-link" or data-flower-link="true", OR
    - have text containing "Order Flower" / "Send Flower" (case-insensitive)
  ============================================================================
-->

<script>
(function () {
  var captured = null;

  function persist(d) {
    if (!d || !d.deceasedName) return;
    captured = d;
    try { localStorage.setItem('obituaryData', JSON.stringify(d)); } catch(e) {}
    try { window.obituaryData = d; } catch(e) {}
    rewriteLinks();
  }

  function paramsFromData(d) {
    var p = new URLSearchParams();
    ['deceasedName','serviceDate','serviceDateTime','serviceLocation','obituaryUrl'].forEach(function(k){
      if (d[k]) p.set(k, d[k]);
    });
    return p.toString();
  }

  function isFlowerLink(a) {
    if (!a || !a.href) return false;
    if (a.classList && a.classList.contains('rb-flower-link')) return true;
    if (a.dataset && a.dataset.flowerLink === 'true') return true;
    var txt = (a.textContent || '').toLowerCase();
    if (txt.indexOf('order flower') > -1 || txt.indexOf('send flower') > -1) return true;
    return false;
  }

  function rewriteLinks() {
    if (!captured) return;
    var qs = paramsFromData(captured);
    if (!qs) return;
    document.querySelectorAll('a').forEach(function(a){
      if (!isFlowerLink(a)) return;
      if (a.dataset.rbFlowerInjected === '1') return;
      try {
        var url = new URL(a.href, window.location.href);
        var existing = url.searchParams;
        new URLSearchParams(qs).forEach(function(v, k){ existing.set(k, v); });
        url.search = existing.toString();
        a.href = url.toString();
        a.dataset.rbFlowerInjected = '1';
      } catch(e) { console.warn('[FlowerLink] could not rewrite', a.href, e); }
    });
  }

  // Listen for postMessage from the obituary embed iframe
  window.addEventListener('message', function (ev) {
    var data = ev.data;
    if (!data || data.type !== 'rbObituaryData' || !data.payload) return;
    persist(data.payload);
  });

  // Also re-scan when DOM changes (in case the link is added after iframe load)
  if (window.MutationObserver) {
    var mo = new MutationObserver(function(){ rewriteLinks(); });
    mo.observe(document.body, { childList: true, subtree: true });
  }

  // Restore from localStorage on subsequent visits
  try {
    var stored = JSON.parse(localStorage.getItem('obituaryData') || '{}');
    if (stored.deceasedName) persist(stored);
  } catch(e) {}
})();
</script>
